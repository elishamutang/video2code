services:
  backend:
    image: elishamutang/video2code-backend:latest
    container_name: video2code-backend
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runner
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    expose:
      - "8000"
    env_file:
      - ./server/adv_ui_ocrroo_project/.env
    volumes:
      - media_volume:/app/adv_ui_ocrroo_project/adv_ui_ocrroo_app/media
    networks:
      - video2code-net

  nginx:
    image: elishamutang/video2code-nginx:latest
    container_name: video2code-nginx
    build:
      context: ./client
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/app/adv_ui_ocrroo_app/media
    networks:
      - video2code-net

volumes:
  media_volume:

networks:
  video2code-net:
    driver: bridge
    name: video2code-net
